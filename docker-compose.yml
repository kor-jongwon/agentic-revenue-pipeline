services:
  # 1. ARP Pipeline Agent
  arp-agent:
    build: .
    container_name: arp_pipeline_agent
    env_file:
      - .env
    volumes:
      - .:/app
    command: python main.py
    restart: always

  # 2. ARP Management Dashboard
  arp-dashboard:
    build: .
    container_name: arp_dashboard
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: python api/main.py
    depends_on:
      - arp-agent
    restart: always
